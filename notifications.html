<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — EduBD Pro</title>
  <meta name="description" content="Academic notifications, exam alerts, and announcements">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .notif-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn { padding:7px 16px; border-radius:20px; background:var(--bg-card2); border:1px solid var(--border); font-size:0.82rem; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:var(--transition); }
    .filter-btn.active { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; border-color:transparent; }
    .filter-btn:hover:not(.active) { border-color:var(--primary); color:var(--primary-light); }
    .notif-item-full { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:18px; display:flex; gap:16px; align-items:flex-start; transition:var(--transition); cursor:pointer; }
    .notif-item-full:hover { border-color:var(--primary); background:rgba(108,99,255,0.05); }
    .notif-item-full.unread { border-left:3px solid var(--primary); }
    .notif-actions { display:flex; gap:8px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="navbar">
    <div class="nav-brand"><div class="logo-icon">⚡</div><span>EduBD Pro</span></div>
    <div class="nav-right">
      <div class="nav-notif" onclick="window.location.href='notifications.html'">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></div>
      <div class="nav-avatar" id="navAvatar">A</div>
      <span id="navName" style="font-weight:600;font-size:0.9rem;color:var(--text-secondary);"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
      <button id="menuToggle" style="display:none;background:var(--bg-card2);border:1px solid var(--border);color:var(--text-primary);padding:8px;border-radius:8px;font-size:1.2rem;">☰</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li><span class="sidebar-section">Main Menu</span></li>
        <li><a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a></li>
        <li><a href="attendance.html"><span class="icon">📅</span> Attendance</a></li>
        <li><a href="submissions.html"><span class="icon">📝</span> Submissions</a></li>
        <li><a href="syllabus.html"><span class="icon">📚</span> Syllabus</a></li>
        <li><a href="notifications.html"><span class="icon">🔔</span> Notifications</a></li>
        <li><span class="sidebar-section">Account</span></li>
        <li><a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
        <div>
          <h1 class="page-title">🔔 Notifications</h1>
          <p class="page-subtitle">সকল নোটিশ ও আপডেট</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="markAllRead()">✓ সব পড়া হয়েছে</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:20px;" id="notifStats"></div>

      <!-- Filter -->
      <div class="notif-filter">
        <button class="filter-btn active" onclick="filterNotif('all',this)">🔔 সব</button>
        <button class="filter-btn" onclick="filterNotif('assignment',this)">📝 Assignment</button>
        <button class="filter-btn" onclick="filterNotif('quiz',this)">📊 Quiz</button>
        <button class="filter-btn" onclick="filterNotif('attendance',this)">📅 Attendance</button>
        <button class="filter-btn" onclick="filterNotif('classtest',this)">✏️ Class Test</button>
        <button class="filter-btn" onclick="filterNotif('syllabus',this)">📚 Syllabus</button>
      </div>

      <!-- Notification List -->
      <div id="notifContainer" style="display:flex;flex-direction:column;gap:12px;"></div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="notifModal" style="display:none;" onclick="closeModal(event)">
    <div class="modal" style="max-width:520px;">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">নোটিশ</div>
        <button class="modal-close" onclick="document.getElementById('notifModal').style.display='none'">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div class="notif-icon" id="modalIcon" style="width:48px;height:48px;font-size:1.4rem;border-radius:12px;display:flex;align-items:center;justify-content:center;"></div>
        <div>
          <div id="modalTime" style="font-size:0.8rem;color:var(--text-muted);"></div>
        </div>
      </div>
      <p id="modalMsg" style="color:var(--text-secondary);font-size:0.92rem;line-height:1.7;"></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireLogin();
    let notifications = store.get('notifications') || [];
    let currentFilter = 'all';

    function renderStats() {
      const unread = notifications.filter(n => n.unread).length;
      const total = notifications.length;
      document.getElementById('notifStats').innerHTML = `
        <div class="stat-card purple"><div class="stat-icon">🔔</div><div class="stat-value">${total}</div><div class="stat-label">মোট নোটিশ</div></div>
        <div class="stat-card red"><div class="stat-icon">🔴</div><div class="stat-value">${unread}</div><div class="stat-label">অপঠিত</div></div>
        <div class="stat-card teal"><div class="stat-icon">✅</div><div class="stat-value">${total - unread}</div><div class="stat-label">পড়া হয়েছে</div></div>`;
    }

    function renderNotifs(filter = 'all') {
      const list = filter === 'all' ? notifications : notifications.filter(n => n.type === filter);
      const el = document.getElementById('notifContainer');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>কোনো নোটিশ নেই।</p></div>';
        return;
      }
      el.innerHTML = list.map(n => `
        <div class="notif-item-full ${n.unread ? 'unread' : ''}" onclick="openNotif('${n.id}')">
          <div class="notif-icon ${n.iconClass}" style="width:46px;height:46px;font-size:1.3rem;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${n.icon}</div>
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
              <div class="notif-title">${n.unread ? `<span style="width:8px;height:8px;background:var(--primary);border-radius:50%;display:inline-block;margin-right:6px;"></span>` : ''}${n.title}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);white-space:nowrap;">${n.time}</div>
            </div>
            <div class="notif-msg">${n.message}</div>
            <div class="notif-actions">
              <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();markRead('${n.id}')">✓ পড়া হয়েছে</button>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteNotif('${n.id}')">🗑️ মুছুন</button>
            </div>
          </div>
        </div>`).join('');
    }

    function filterNotif(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderNotifs(filter);
    }

    function openNotif(id) {
      const n = notifications.find(x => x.id === id);
      if (!n) return;
      markRead(id);
      document.getElementById('modalTitle').textContent = n.title;
      document.getElementById('modalMsg').textContent = n.message;
      document.getElementById('modalTime').textContent = '🕒 ' + n.time;
      document.getElementById('modalIcon').className = `notif-icon ${n.iconClass}`;
      document.getElementById('modalIcon').textContent = n.icon;
      document.getElementById('notifModal').style.display = 'flex';
    }

    function markRead(id) {
      notifications = notifications.map(n => n.id === id ? { ...n, unread: false } : n);
      store.set('notifications', notifications);
      renderStats(); renderNotifs(currentFilter);
      // Update badge
      const badge = document.getElementById('notifBadge');
      const unread = notifications.filter(n => n.unread).length;
      if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'flex' : 'none'; }
    }

    function markAllRead() {
      notifications = notifications.map(n => ({ ...n, unread: false }));
      store.set('notifications', notifications);
      showToast('সব নোটিশ পড়া হিসেবে চিহ্নিত হয়েছে', 'success');
      renderStats(); renderNotifs(currentFilter);
    }

    function deleteNotif(id) {
      notifications = notifications.filter(n => n.id !== id);
      store.set('notifications', notifications);
      showToast('নোটিশ মুছে ফেলা হয়েছে', 'info');
      renderStats(); renderNotifs(currentFilter);
    }

    function closeModal(e) {
      if (e.target.id === 'notifModal') document.getElementById('notifModal').style.display = 'none';
    }

    renderStats();
    renderNotifs();
  </script>
</body>
</html>
