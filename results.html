<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — EduBD Pro</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .result-tabs { display:flex; gap:4px; background:var(--bg-card2); border-radius:var(--radius-sm); padding:4px; margin-bottom:24px; overflow-x:auto; }
    .result-tab { padding:10px 22px; border-radius:7px; font-size:0.85rem; font-weight:600; color:var(--text-secondary); background:transparent; border:none; cursor:pointer; white-space:nowrap; transition:var(--transition); }
    .result-tab.active { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; box-shadow:0 4px 12px rgba(108,99,255,0.3); }
    .result-tab:hover:not(.active) { color:var(--text-primary); background:rgba(255,255,255,0.05); }
    .result-section { display:none; animation:fadeIn 0.3s ease; }
    .result-section.active { display:block; }
    .result-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; transition:var(--transition); }
    .result-card:hover { border-color:rgba(108,99,255,0.4); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
    .score-circle { width:72px; height:72px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; }
    .score-circle .score { font-size:1.4rem; line-height:1; }
    .score-circle .total { font-size:0.7rem; opacity:0.7; }
    .grade-badge { padding:5px 14px; border-radius:20px; font-size:0.8rem; font-weight:700; }
    .summary-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.88rem; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <nav class="navbar">
    <div class="nav-brand"><div class="logo-icon">⚡</div><span>EduBD Pro</span></div>
    <div class="nav-right">
      <div class="nav-notif" onclick="window.location.href='notifications.html'">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></div>
      <div class="nav-avatar" id="navAvatar">A</div>
      <span id="navName" style="font-weight:600;font-size:0.9rem;color:var(--text-secondary);"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li><span class="sidebar-section">Main Menu</span></li>
        <li><a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a></li>
        <li><a href="attendance.html"><span class="icon">📅</span> Attendance</a></li>
        <li><a href="submissions.html"><span class="icon">📝</span> Submissions</a></li>
        <li><a href="results.html"><span class="icon">🏆</span> Results</a></li>
        <li><a href="syllabus.html"><span class="icon">📚</span> Syllabus</a></li>
        <li><a href="notifications.html"><span class="icon">🔔</span> Notifications</a></li>
        <li><span class="sidebar-section">Account</span></li>
        <li><a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">🏆 Results</h1>
        <p class="page-subtitle">Mid Exam, Class Test ও Quiz এর সম্পূর্ণ ফলাফল</p>
      </div>

      <!-- Summary Stats -->
      <div class="stats-grid" id="resultStats"></div>

      <!-- Tabs -->
      <div class="result-tabs">
        <button class="result-tab active" onclick="showResult('mid',this)">📊 Mid Exam</button>
        <button class="result-tab" onclick="showResult('class_test',this)">✏️ Class Test</button>
        <button class="result-tab" onclick="showResult('quiz',this)">❓ Quiz</button>
        <button class="result-tab" onclick="showResult('assignment',this)">📝 Assignment</button>
      </div>

      <!-- Mid Exam -->
      <div class="result-section active" id="sec-mid">
        <div class="card" style="margin-bottom:20px;background:linear-gradient(135deg,rgba(108,99,255,0.12),rgba(0,212,170,0.08));border-color:rgba(108,99,255,0.3);">
          <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:4px;">Mid Term Exam 2026</div>
          <div style="font-size:1.1rem;font-weight:700;">৭ম সেমিস্টার — এপ্রিল ২০২৬</div>
        </div>
        <div id="midCards"></div>
      </div>

      <!-- Class Test -->
      <div class="result-section" id="sec-class_test">
        <div id="classTestCards"></div>
      </div>

      <!-- Quiz -->
      <div class="result-section" id="sec-quiz">
        <div id="quizCards"></div>
      </div>

      <!-- Assignment -->
      <div class="result-section" id="sec-assignment">
        <div id="assignCards"></div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireLogin();
    const user = getCurrentUser();
    const midResults = store.get('midResults') || {};
    const myMid = midResults[user.id] || {};
    const allSubs = store.get('submissions') || {};

    function getGrade(marks, total) {
      const p = (marks / total) * 100;
      if (p >= 80) return { grade: 'A+', color: 'var(--secondary)', bg: 'rgba(0,212,170,0.15)' };
      if (p >= 70) return { grade: 'A', color: 'var(--primary-light)', bg: 'rgba(108,99,255,0.15)' };
      if (p >= 60) return { grade: 'B', color: 'var(--yellow)', bg: 'rgba(255,217,61,0.15)' };
      if (p >= 50) return { grade: 'C', color: '#FFA07A', bg: 'rgba(255,160,122,0.15)' };
      return { grade: 'F', color: 'var(--warning)', bg: 'rgba(255,107,107,0.15)' };
    }

    function showResult(tab, el) {
      document.querySelectorAll('.result-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.result-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('sec-' + tab).classList.add('active');
      el.classList.add('active');
    }

    // Stats
    let midTotal = 0, midCount = 0, ctTotal = 0, ctCount = 0, qTotal = 0, qCount = 0;
    SUBJECTS_7TH.forEach(s => {
      const m = myMid[s.code];
      if (m && m.marks !== null) { midTotal += m.marks; midCount++; }
      const ct = ((allSubs[s.code] || {}).class_test || []).find(x => x.studentId === user.id);
      if (ct && ct.marks !== null) { ctTotal += ct.marks; ctCount++; }
      const q = ((allSubs[s.code] || {}).quiz || []).find(x => x.studentId === user.id);
      if (q && q.marks !== null) { qTotal += q.marks; qCount++; }
    });
    document.getElementById('resultStats').innerHTML = `
      <div class="stat-card purple"><div class="stat-icon">📊</div><div class="stat-value">${midCount > 0 ? Math.round(midTotal/midCount) : '—'}</div><div class="stat-label">গড় Mid নম্বর</div></div>
      <div class="stat-card teal"><div class="stat-icon">✏️</div><div class="stat-value">${ctCount > 0 ? Math.round(ctTotal/ctCount*10)/10 : '—'}<span style="font-size:1rem;">/20</span></div><div class="stat-label">গড় Class Test</div></div>
      <div class="stat-card yellow"><div class="stat-icon">❓</div><div class="stat-value">${qCount > 0 ? Math.round(qTotal/qCount*10)/10 : '—'}<span style="font-size:1rem;">/10</span></div><div class="stat-label">গড় Quiz</div></div>
      <div class="stat-card red"><div class="stat-icon">📚</div><div class="stat-value">${SUBJECTS_7TH.length}</div><div class="stat-label">মোট সাবজেক্ট</div></div>`;

    // Mid Exam Cards
    const midEl = document.getElementById('midCards');
    SUBJECTS_7TH.forEach(s => {
      const m = myMid[s.code];
      if (!m) return;
      if (m.marks === null) {
        midEl.innerHTML += `<div class="result-card"><div><div style="font-size:0.72rem;color:var(--primary-light);letter-spacing:1px;margin-bottom:3px;">${s.code}</div><div style="font-weight:700;font-size:1rem;">${s.name}</div><div style="font-size:0.82rem;color:var(--text-secondary);margin-top:4px;">📅 ${m.date || 'তারিখ নির্ধারিত হয়নি'}</div></div><span class="badge badge-yellow">⏳ Result আসেনি</span></div>`;
        return;
      }
      const g = getGrade(m.marks, m.total);
      const pct = Math.round((m.marks / m.total) * 100);
      midEl.innerHTML += `
        <div class="result-card">
          <div style="flex:1;">
            <div style="font-size:0.72rem;color:var(--primary-light);letter-spacing:1px;margin-bottom:3px;">${s.code}</div>
            <div style="font-weight:700;font-size:1rem;">${s.name}</div>
            <div style="font-size:0.82rem;color:var(--text-secondary);margin-top:4px;">📅 ${m.date}</div>
            <div style="margin-top:10px;"><div class="progress-bar"><div class="progress-fill ${pct<50?'danger':pct<60?'warning':''}" style="width:${pct}%"></div></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;">
            <div class="score-circle" style="background:${g.bg};color:${g.color};border:2px solid ${g.color}30;">
              <div class="score">${m.marks}</div>
              <div class="total">/${m.total}</div>
            </div>
            <span class="grade-badge" style="background:${g.bg};color:${g.color};">Grade ${g.grade} — ${pct}%</span>
          </div>
        </div>`;
    });

    // Class Test
    const ctEl = document.getElementById('classTestCards');
    SUBJECTS_7TH.forEach(s => {
      const d = ((allSubs[s.code] || {}).class_test || []).find(x => x.studentId === user.id);
      const status = d ? d.status : 'not_given';
      const marks = d ? d.marks : null;
      let badge = '', info = '';
      if (status === 'submitted' && marks !== null) {
        const g = getGrade(marks, 20);
        badge = `<div style="display:flex;align-items:center;gap:12px;"><div class="score-circle" style="width:60px;height:60px;background:${g.bg};color:${g.color};border:2px solid ${g.color}30;"><div class="score" style="font-size:1.2rem;">${marks}</div><div class="total">/20</div></div><span class="grade-badge" style="background:${g.bg};color:${g.color};">Grade ${g.grade}</span></div>`;
      } else if (status === 'submitted') {
        badge = `<span class="badge badge-success">✅ দেওয়া হয়েছে</span>`;
      } else if (status === 'upcoming') {
        badge = `<span class="badge badge-yellow">📅 ${d.upcomingDate || 'শীঘ্রই'}</span>`;
      } else if (status === 'not_given') {
        badge = `<span class="badge badge-primary">🔔 দেওয়া হয়নি</span>`;
      }
      ctEl.innerHTML += `<div class="result-card"><div><div style="font-size:0.72rem;color:var(--primary-light);letter-spacing:1px;margin-bottom:3px;">${s.code}</div><div style="font-weight:700;">${s.name}</div>${d && d.date ? `<div style="font-size:0.8rem;color:var(--text-secondary);margin-top:3px;">📅 ${d.date}</div>` : ''}</div>${badge}</div>`;
    });

    // Quiz
    const qEl = document.getElementById('quizCards');
    SUBJECTS_7TH.forEach(s => {
      const d = ((allSubs[s.code] || {}).quiz || []).find(x => x.studentId === user.id);
      const status = d ? d.status : 'not_given';
      const marks = d ? d.marks : null;
      let badge = '';
      if (status === 'submitted' && marks !== null) {
        const g = getGrade(marks, 10);
        badge = `<div style="display:flex;align-items:center;gap:12px;"><div class="score-circle" style="width:60px;height:60px;background:${g.bg};color:${g.color};border:2px solid ${g.color}30;"><div class="score" style="font-size:1.2rem;">${marks}</div><div class="total">/10</div></div><span class="grade-badge" style="background:${g.bg};color:${g.color};">Grade ${g.grade}</span></div>`;
      } else if (status === 'upcoming') {
        const dl = d.upcomingDate ? daysLeft(d.upcomingDate) : null;
        badge = `<span class="badge badge-yellow">📅 ${d.upcomingDate || 'শীঘ্রই'}${dl !== null ? ` (${dl} দিন বাকি)` : ''}</span>`;
      } else {
        badge = `<span class="badge badge-primary">🔔 হয়নি</span>`;
      }
      qEl.innerHTML += `<div class="result-card"><div><div style="font-size:0.72rem;color:var(--primary-light);letter-spacing:1px;margin-bottom:3px;">${s.code}</div><div style="font-weight:700;">${s.name}</div></div>${badge}</div>`;
    });

    // Assignment
    const aEl = document.getElementById('assignCards');
    SUBJECTS_7TH.forEach(s => {
      const d = ((allSubs[s.code] || {}).assignment || []).find(x => x.studentId === user.id);
      const status = d ? d.status : 'not_given';
      const marks = d ? d.marks : null;
      let badge = '';
      if (status === 'submitted' && marks !== null) {
        const g = getGrade(marks, 20);
        badge = `<div style="display:flex;align-items:center;gap:12px;"><div class="score-circle" style="width:60px;height:60px;background:${g.bg};color:${g.color};border:2px solid ${g.color}30;"><div class="score" style="font-size:1.2rem;">${marks}</div><div class="total">/20</div></div><span class="grade-badge" style="background:${g.bg};color:${g.color};">Grade ${g.grade}</span></div>`;
      } else if (status === 'submitted') {
        badge = `<span class="badge badge-success">✅ জমা হয়েছে</span>`;
      } else if (status === 'pending' && d.dueDate) {
        const dl = daysLeft(d.dueDate);
        const color = dl <= 2 ? 'badge-danger' : 'badge-yellow';
        badge = `<span class="badge ${color}">⏳ Due: ${d.dueDate} (${dl} দিন বাকি)</span>`;
      } else if (status === 'upcoming') {
        badge = `<span class="badge badge-primary">📅 আসবে: ${d.upcomingDate || 'শীঘ্রই'}</span>`;
      } else {
        badge = `<span class="badge" style="background:rgba(100,100,120,0.2);color:var(--text-muted);">🔔 দেওয়া হয়নি</span>`;
      }
      aEl.innerHTML += `<div class="result-card"><div><div style="font-size:0.72rem;color:var(--primary-light);letter-spacing:1px;margin-bottom:3px;">${s.code}</div><div style="font-weight:700;">${s.name}</div></div>${badge}</div>`;
    });
  </script>
</body>
</html>
