<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus — EduBD Pro</title>
  <meta name="description" content="Semester-wise syllabus viewer for all subjects">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .syllabus-search { position:relative; margin-bottom:20px; }
    .syllabus-search input { padding-left:42px; }
    .syllabus-search .s-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1rem; }
    .copy-btn { background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3); color:var(--primary-light); padding:6px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; transition:var(--transition); }
    .copy-btn:hover { background:rgba(108,99,255,0.25); }
    .chapter-line { border-left:3px solid var(--primary); padding-left:12px; margin:8px 0; font-weight:600; color:var(--text-primary); }
    .sub-topic { padding-left:20px; color:var(--text-secondary); font-size:0.85rem; }
    .syllabus-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .sub-pill { padding:7px 16px; border-radius:20px; background:var(--bg-card2); border:1px solid var(--border); font-size:0.82rem; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:var(--transition); }
    .sub-pill.active { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; border-color:transparent; }
    .sub-pill:hover:not(.active) { border-color:var(--primary); color:var(--primary-light); }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="navbar">
    <div class="nav-brand"><div class="logo-icon">⚡</div><span>EduBD Pro</span></div>
    <div class="nav-right">
      <div class="nav-notif" onclick="window.location.href='notifications.html'">🔔<span class="notif-badge" id="notifBadge" style="display:none;">0</span></div>
      <div class="nav-avatar" id="navAvatar">A</div>
      <span id="navName" style="font-weight:600;font-size:0.9rem;color:var(--text-secondary);"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
      <button id="menuToggle" style="display:none;background:var(--bg-card2);border:1px solid var(--border);color:var(--text-primary);padding:8px;border-radius:8px;font-size:1.2rem;">☰</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li><span class="sidebar-section">Main Menu</span></li>
        <li><a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a></li>
        <li><a href="attendance.html"><span class="icon">📅</span> Attendance</a></li>
        <li><a href="submissions.html"><span class="icon">📝</span> Submissions</a></li>
        <li><a href="syllabus.html"><span class="icon">📚</span> Syllabus</a></li>
        <li><a href="notifications.html"><span class="icon">🔔</span> Notifications</a></li>
        <li><span class="sidebar-section">Account</span></li>
        <li><a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">📚 Syllabus</h1>
        <p class="page-subtitle">৭ম সেমিস্টার — সকল সাবজেক্টের সিলেবাস</p>
      </div>

      <!-- Search -->
      <div class="syllabus-search">
        <span class="s-icon">🔍</span>
        <input type="text" class="form-control" id="searchInput" placeholder="সিলেবাস সার্চ করুন..." oninput="filterSyllabus()">
      </div>

      <!-- Subject Pills -->
      <div class="syllabus-pills" id="subjectPills"></div>

      <!-- Syllabus Content -->
      <div id="syllabusContent"></div>

      <!-- All subjects expanded -->
      <div id="allSyllabus" style="display:none;"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireLogin();
    let activeSub = 'all';
    const syllabusData = store.get('syllabus') || {};

    function buildPills() {
      const el = document.getElementById('subjectPills');
      el.innerHTML = `<span class="sub-pill ${activeSub==='all'?'active':''}" onclick="selectSub('all')">📚 সব সাবজেক্ট</span>`;
      SUBJECTS_7TH.forEach(s => {
        el.innerHTML += `<span class="sub-pill ${activeSub===s.code?'active':''}" onclick="selectSub('${s.code}')">${s.short}</span>`;
      });
    }

    function formatSyllabus(text) {
      if (!text) return '<p style="color:var(--text-muted);">সিলেবাস পাওয়া যায়নি।</p>';
      return text.split('\n').map(line => {
        line = line.trim();
        if (!line) return '<br>';
        if (line.startsWith('Chapter')) return `<div class="chapter-line">📌 ${line}</div>`;
        if (line.startsWith('-')) return `<div class="sub-topic">• ${line.slice(1).trim()}</div>`;
        return `<div class="sub-topic" style="color:var(--text-primary);font-weight:500;">${line}</div>`;
      }).join('');
    }

    function renderSingle(code) {
      const s = SUBJECTS_7TH.find(x => x.code === code);
      const text = syllabusData[code] || '';
      document.getElementById('syllabusContent').innerHTML = `
        <div class="syllabus-card">
          <div class="syllabus-header">
            <div>
              <div style="font-size:0.72rem;color:var(--primary-light);font-weight:700;letter-spacing:1px;margin-bottom:4px;">${code}</div>
              <h2 style="font-size:1.1rem;font-weight:700;">${s ? s.name : ''}</h2>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="copy-btn" onclick="copySyllabus('${code}')">📋 Copy</button>
              <button class="copy-btn" style="background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.3);color:var(--secondary);" onclick="printSyllabus('${code}')">🖨️ Print</button>
            </div>
          </div>
          <div class="syllabus-content">${formatSyllabus(text)}</div>
        </div>`;
    }

    function renderAll(query = '') {
      let html = '';
      SUBJECTS_7TH.forEach(s => {
        const text = syllabusData[s.code] || '';
        if (query && !text.toLowerCase().includes(query.toLowerCase()) && !s.name.toLowerCase().includes(query.toLowerCase())) return;
        html += `
          <div class="syllabus-card">
            <div class="syllabus-header">
              <div>
                <div style="font-size:0.72rem;color:var(--primary-light);font-weight:700;letter-spacing:1px;margin-bottom:4px;">${s.code}</div>
                <h2 style="font-size:1rem;font-weight:700;">${s.name}</h2>
              </div>
              <button class="copy-btn" onclick="copySyllabus('${s.code}')">📋 Copy</button>
            </div>
            <div class="syllabus-content">${formatSyllabus(text)}</div>
          </div>`;
      });
      document.getElementById('syllabusContent').innerHTML = html || '<div class="empty-state"><div class="empty-icon">🔍</div><p>কোনো ফলাফল পাওয়া যায়নি।</p></div>';
    }

    function selectSub(code) {
      activeSub = code;
      buildPills();
      document.getElementById('searchInput').value = '';
      if (code === 'all') renderAll();
      else renderSingle(code);
    }

    function filterSyllabus() {
      const q = document.getElementById('searchInput').value;
      if (activeSub === 'all') renderAll(q);
      else renderAll(q);
      activeSub = 'all';
      buildPills();
    }

    function copySyllabus(code) {
      const text = syllabusData[code] || '';
      navigator.clipboard.writeText(text).then(() => showToast('Syllabus কপি হয়েছে!', 'success'));
    }

    function printSyllabus(code) {
      const s = SUBJECTS_7TH.find(x => x.code === code);
      const text = syllabusData[code] || '';
      const w = window.open('', '_blank');
      w.document.write(`<html><head><title>${s.name}</title></head><body><h2>${s.name} (${code})</h2><pre>${text}</pre></body></html>`);
      w.print();
    }

    buildPills();
    renderAll();
  </script>
</body>
</html>
